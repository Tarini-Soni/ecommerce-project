{% load static %}

<!DOCTYPE html>
<html>
<head>
    <title>E-Commerce Store</title>

    <!-- Bootstrap CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light">

<nav class="navbar navbar-dark bg-dark px-3">
    <a class="navbar-brand" href="/">My Store</a>
    <a class="btn btn-outline-light" href="/cart/">Cart</a>
</nav>

<div class="container mt-4">

    <h2 class="mb-4 text-center">Products</h2>

    <div class="row">

        {% for product in products %}
        <div class="col-md-4 mb-4">

            <div class="card shadow-sm">

                {% if product.image %}
                <img src="{{ product.image.url }}" class="card-img-top" style="height:200px; object-fit:cover;">
                {% endif %}

                <div class="card-body text-center">

                    <h5 class="card-title">{{ product.name }}</h5>

                    <p class="card-text">₹{{ product.price }}</p>

                    <a href="/add-to-cart/{{ product.id }}/" class="btn btn-primary">
                        Add to Cart
                    </a>

                </div>
            </div>

        </div>
        {% empty %}
            <p>No products available</p>
        {% endfor %}

    </div>
</div>

</body>
</html>
