<!DOCTYPE html>
<html>
<head>
    <title>Cart</title>
</head>
<body>

    <h1>Your Cart</h1>

    {% for product in products %}
        <div>
            <h3>{{ product.name }}</h3>
            <p>Price: ₹{{ product.price }}</p>
            <p>Quantity: {{ product.quantity }}</p>
            <p>Total: ₹{{ product.total }}</p>
            <hr>
        </div>
    {% empty %}
        <p>Your cart is empty</p>
    {% endfor %}

    <h2>Total Price: ₹{{ total_price }}</h2>

    <a href="/">Continue Shopping</a>

</body>
</html>
